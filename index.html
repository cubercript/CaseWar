<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Título de la página -->
    <title>CaseWar</title>

    <!-- Link al CSS -->
    <link rel="stylesheet" href="style/index.css">

</head>
<body class="body">

    <!-- Menú principal / Saldo del jugador / Reinicios del jugador -->
    <header class="header flex align-middle">

        <div class="menu left flex max align-middle">

            <p id="info" class="menu-item">Info</p>
            <p id="colection" class="menu-item">Colección</p>
            <p id="store" class="menu-item">Tienda</p>

        </div>

        <div class="right justify-end max">
            <div class="status flex radius">

                <div class="bank align-middle left">
                    <p id="bank"><strong>Dinero: 0€</strong></p>
                </div>
                
                <div class="resets align-middle right">
                    <p id="resets"><strong>Resets: 0</strong></p>
                </div>

            </div>
        </div>

    </header>


    <!-- Cuadrado VS -->
    <div class="vs-content max align-middle justify-middle">
        <p class="vs text-center align-middle radius">VS</p>
    </div>


    <!-- Contenido de la página -->
    <main class="main flex">

        <!-- Lateral izquierdo (user) -->
        <div class="user-desktop left align-middle justify-middle flex column">

            <!-- Caja de la ruleta -->
            <div class="box-roulette radius">

                <!-- Items de la ruleta -->
                <div id="roulette" class="roulette"></div>


                <!-- Botones en absolute dentro de la ruleta -->
                <div class="buttons align-middle justify-middle flex column max">

                    <button id="tirarCaja" class="tirarCaja radius">Tirar caja</button>
                    <button id="venderArma" class="venderArma radius oculto">Vender arma</button>
                    <button id="luchar" class="luchar radius oculto">Luchar</button>

                </div>
            </div>

            <br><br>

            <h2 class="stats-title">Estadísticas</h2>

            <!-- Tabla de stats -->
            <div class="table-container">
                <table class="max">
                    <tr class="line">
                        <td class="left-table weapon">Arma</td>
                        <td class="right-table weapon" id="weapon"></td>
                    </tr>
                    <tr>
                        <td class="left-table damage">Daño</td>
                        <td class="right-table damage" id="damage"></td>
                    </tr>
                    <tr>
                        <td class="left-table value">Valor</td>
                        <td class="right-table value" id="value"></td>
                    </tr>
                    <tr>
                        <td class="left-table-bottom type">Tipo</td>
                        <td class="right-table-bottom type" id="type"></td>
                    </tr>
                </table>
            </div>



        </div>

        
        <!-- Lateral derecho (bot) -->
        <div class="right align-middle justify-middle flex column">
            <!-- Caja de la ruleta -->
            <div class="box-roulette radius">

                <!-- Items de la ruleta -->
                <div id="bot-roulette" class="roulette"></div>

            </div>

            <br><br>

            <h2 class="stats-title">Estadísticas</h2>

            <!-- Tabla de stats -->
            <div class="table-container">
                <table class="max">
                    <tr class="line">
                        <td class="left-table weapon">Arma</td>
                        <td class="right-table weapon" id="bot-weapon"></td>
                    </tr>
                    <tr>
                        <td class="left-table damage">Daño</td>
                        <td class="right-table damage" id="bot-damage"></td>
                    </tr>
                    <tr>
                        <td class="left-table value">Valor</td>
                        <td class="right-table value" id="bot-value"></td>
                    </tr>
                    <tr>
                        <td class="left-table-bottom type">Tipo</td>
                        <td class="right-table-bottom type" id="bot-type"></td>
                    </tr>
                </table>
            </div>
        </div>

    </main>


    <footer></footer>


    <!-- ZONA DE SCRIPTS -->
    <script src="bbdd/bbdd.js"></script>
    <script src="logic/variables.js"></script>
    <script src="logic/tirarCaja.js"></script>
    <script src="logic/tirarLucha.js"></script>
    <script src="logic/vender.js"></script>

</body>
</html>
